<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teyvat Archive | Genshin Impact API</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --genshin-dark: #1c1c2e;
        --genshin-light-bg: #2b2b40;
        --genshin-gold: #d4af37;
        --genshin-gold-hover: #f9d775;
        --text-light: #f4f4f4;
      }
      
      body {
        background-color: var(--genshin-dark);
        color: var(--text-light);
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1, h2, h3, .navbar-brand, .nav-link {
        font-family: 'Cinzel', serif;
      }

      .navbar {
        background-color: rgba(28, 28, 46, 0.95) !important;
        border-bottom: 2px solid var(--genshin-gold);
      }

      .navbar-brand {
        color: var(--genshin-gold) !important;
        font-size: 1.8rem;
        font-weight: 700;
      }

      .nav-link {
        color: var(--text-light) !important;
        transition: color 0.3s;
        cursor: pointer;
      }

      .nav-link:hover, .nav-link.active {
        color: var(--genshin-gold-hover) !important;
      }

      .hero {
        background: radial-gradient(circle, var(--genshin-light-bg) 0%, var(--genshin-dark) 100%);
        padding: 3rem 0;
        text-align: center;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      }

      .genshin-card {
        background-color: var(--genshin-light-bg);
        border: 1px solid rgba(212, 175, 55, 0.4);
        border-radius: 8px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        height: 100%;
        text-align: center;
        padding: 1rem;
      }

      .genshin-card:hover {
        transform: translateY(-5px);
        border-color: var(--genshin-gold);
        box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
      }

      .item-icon {
        width: 100px;
        height: 100px;
        object-fit: contain;
        margin-bottom: 1rem;
        border-radius: 50%;
        background-color: rgba(0,0,0,0.2);
        padding: 5px;
      }

      .item-name {
        color: var(--genshin-gold);
        font-family: 'Cinzel', serif;
        text-transform: capitalize;
        font-size: 1.1rem;
      }

      #loader { display: none; color: var(--genshin-gold); }
    </style>
  </head>
  <body>

    
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="#" onclick="loadPage('characters')">✦ Teyvat Archive</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--genshin-gold);">
          <span class="navbar-toggler-icon" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(175deg);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" id="nav-characters" onclick="loadPage('characters')">Characters</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-weapons" onclick="loadPage('weapons')">Weapons</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-artifacts" onclick="loadPage('artifacts')">Artifacts</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-elements" onclick="loadPage('elements')">Elements</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-nations" onclick="loadPage('nations')">Nations</a></li>
          </ul>
        </div>
      </div>
    </nav>

    
    <header class="hero">
      <div class="container">
        <h1 id="pageTitle" class="display-4" style="color: var(--genshin-gold);">Characters</h1>
        <p id="pageSubtitle" class="lead">Explore the heroes traversing the world of Teyvat.</p>
      </div>
    </header>

    
    <main class="container my-5 flex-grow-1">
      <div id="loader" class="text-center my-5">
        <div class="spinner-border" role="status"></div>
        <p class="mt-3" style="font-family: 'Cinzel', serif;">Connecting to Irminsul...</p>
      </div>
      
      <div class="row g-4" id="dataGrid">
        <!-- JS will inject the API data here -->
      </div>
    </main>

    
    <footer class="text-center py-3" style="background-color: var(--genshin-light-bg); border-top: 1px solid var(--genshin-gold);">
      <p class="mb-0 small text-muted">Powered by genshin.jmp.blue API | Ad Astra Abyssosque</p>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    
    <script>
      const baseUrl = 'https://genshin.jmp.blue';
      const dataGrid = document.getElementById('dataGrid');
      const loader = document.getElementById('loader');
      const pageTitle = document.getElementById('pageTitle');
      const pageSubtitle = document.getElementById('pageSubtitle');

      // Dictionary for page titles and subtitles
      const pageInfo = {
        characters: { title: "Characters", sub: "Explore the heroes traversing the world of Teyvat." },
        weapons: { title: "Weapons", sub: "Discover the armaments forged for battle." },
        artifacts: { title: "Artifacts", sub: "Relics of the past that bestow great power." },
        elements: { title: "Elements", sub: "The fundamental powers that shape the world." },
        nations: { title: "Nations", sub: "The seven regions ruled by the Archons." }
      };

      // Main function to load different "pages"
      async function loadPage(endpoint) {
        // Update UI state
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.getElementById(`nav-${endpoint}`).classList.add('active');
        
        pageTitle.textContent = pageInfo[endpoint].title;
        pageSubtitle.textContent = pageInfo[endpoint].sub;
        
        dataGrid.innerHTML = '';
        loader.style.display = 'block';

        try {
          // Fetch the list of items from the API
          const response = await fetch(`${baseUrl}/${endpoint}`);
          const items = await response.json();
          
          // Slice to limit results to keep performance fast (top 20 items)
          const displayItems = items.slice(0, 20);

          // Build the grid
          displayItems.forEach(item => {
            // Format the name by replacing hyphens with spaces
            const displayName = item.replace(/-/g, ' ');
            
            // Determine the correct image URL based on the category
            let imageUrl = `${baseUrl}/${endpoint}/${item}/icon`;
            if (endpoint === 'artifacts') {
              // Artifacts use a specific piece for their icon
              imageUrl = `${baseUrl}/${endpoint}/${item}/flower-of-life`;
            }

            // Create HTML card
            const card = `
              <div class="col-6 col-md-4 col-lg-3">
                <div class="genshin-card">
                  <img src="${imageUrl}" alt="${displayName}" class="item-icon" onerror="this.src='https://via.placeholder.com/100?text=No+Icon'">
                  <h3 class="item-name">${displayName}</h3>
                </div>
              </div>
            `;
            dataGrid.insertAdjacentHTML('beforeend', card);
          });

          loader.style.display = 'none';

        } catch (error) {
          console.error("API Error:", error);
          loader.style.display = 'none';
          dataGrid.innerHTML = `<div class="col-12 text-center text-danger"><p>Failed to connect to the Ley Lines. Please try again.</p></div>`;
        }
      }

      // Load characters page by default when website opens
      window.onload = () => loadPage('characters');
    </script>
  </body>
</html>
